<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex btn</title>
</head>
    <style>
    .container{
        margin-top: 50px;
        margin-left: 40px;
    }

        h3 {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif ;
            font-size: 32px;
        }
        button{
            padding: 12px 30px;
            border: none;
            color: white;
            background-color: blue;
            border-radius: 6px;
            margin-left: 20px;

        }
         .btn1{
            
            background-color: blue;
        }
        .btn2{
            background-color: black;
        }
        .btn3{
           background-color: rgb(118, 33,197);

            color: black;
            border: 1px solid black;
            border-radius: 50;
        }
        .btn4{
             background-color: rgb(118, 33,197);

            cursor: pointer;
            transition: all 0.3s;
        }
        .btn4:hover{
            background-color: rgb(118, 33,197);

        }
        .btn5{
            background-color: brown;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn5:hover{
            background-color: transparent;
            color: blue;
           /* border: 1px solid blue; */
           outline: 2px solid blue;
        }
        .btn6{
            background-color: transparent;
            color: blue;
            outline: 1px solid blue;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;

        }
        .btn6:hover{
            background-color: black;
            color: white;
            outline: none;

        }
        .btn7{
            background-color: black;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn7:hover{
            transform:scale(1.1) ;
            background-color: rgb(49,49,49);

        }
        .btn8{
            background-color: wheat;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn8:hover{
            transform:rotate(20deg) ;
            background-color: rgb(1,1,150);

        }
         .btn9{
            background-color: black;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn9:hover{
            transform:scale(0.9) ;
            background-color: rgb(1,1,150);

        }

</style>
<body>
    <div class="container">
        <h3> Primary</h3>
        <button class="btn1"> Primary btn</button>
        <button class="btn2"> Primary btn</button>
        <button class="btn3"> Primary btn</button>

    </div>

    <div class="container">
        <h3> Primary</h3>
        <button class="btn4"> Primary btn</button>
        <button class="btn5"> Primary btn</button>
        <button class="btn6"> Primary btn</button>

    </div>

    <div class="container">
        <h3> Primary</h3>
        <button class="btn7"> Primary btn</button>
        <button class="btn8"> Primary btn</button>
        <button class="btn9"> Primary btn</button>

    </div>
</body>
</html>
